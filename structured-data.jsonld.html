<!--
  OPTIONAL JSON-LD structured data for bizcise.

  Claude CMS strips <script> tags at ingest, so JSON-LD cannot live inside the
  CMS-managed template — that is why index.html uses schema.org MICRODATA
  (itemscope/itemprop) instead, which survives ingest and is read by Google & AI engines.

  If you ALSO want classic JSON-LD (e.g. you serve index.html directly, or you
  inject it at the server layer AFTER the CMS render), paste the block below into
  the <head> at the server level. Do NOT paste it into the CMS editor — it will be removed.
-->

    },

      "@id": "https://bizcise.com/#website",
      "url": "https://bizcise.com/",
      "name": "bizcise",
      "publisher": { "@id": "https://bizcise.com/#org" }
    },
    {
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "What is bizcise?", "acceptedAnswer": { "@type": "Answer", "text": "bizcise is partner ecosystem intelligence that brings clarity to partner-led go-to-market, consolidating partner intelligence, performance assessment, and market demand signals into a single clarity system." } },

      ]

  ]
}
</script>
